    const BRACKETS = ['S','H','M','L'];
    const BRACKET_LABEL = {S:'Super',H:'High',M:'Medium',L:'Low'};

    const FESTIVAL_START = new Date('2026-05-03T00:00:00Z');
    const FESTIVAL_END_DAY = 37;

    function generateSchedule() {
      const events = [];
      for (let week = 0; week < 6; week++) {
        for (const tmpl of WEEK_TEMPLATE) {
          const dayInFestival = week * 7 + tmpl.d;
          if (dayInFestival > FESTIVAL_END_DAY) continue;
          const eventNum = tmpl.n + week * 68;
          const date = new Date(FESTIVAL_START);
          date.setUTCDate(date.getUTCDate() + dayInFestival);
          const dateStr = date.toISOString().slice(0, 10);
          BRACKETS.forEach((bracket, i) => {
            if (tmpl.sp) {
              const sp = tmpl.sp[i];
              if (!sp) return;
              events.push({ id: `${eventNum}-${bracket}`, num: eventNum, date: dateStr, time: sp.t, bracket, name: sp.nm, buyIn: sp.bi, gtd: sp.g });
            } else {
              if (!tmpl.b[i]) return;
              const [bi, g] = tmpl.b[i];
              events.push({ id: `${eventNum}-${bracket}`, num: eventNum, date: dateStr, time: tmpl.t, bracket, name: tmpl.nm, buyIn: bi, gtd: g });
            }
          });
        }
      }
      return events;
    }

    const SCHEDULE = generateSchedule();

    function fmt$(n) { return '$' + Math.round(n).toLocaleString(); }
    function fmtDate(s) {
      const d = new Date(s + 'T00:00:00Z');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'UTC' });
    }
    function isPast(dateStr) { return new Date(dateStr + 'T23:59:59Z') < new Date(); }

    /* In the money = top 20% or better */
    function inTheMoney(finish, entrants) {
      if (!finish || !entrants) return false;
      return (finish / entrants) <= 0.20;
    }
    /* Top 10% rounded down: finish <= floor(0.10 * entrants) */
    function isTop10Pct(finish, entrants) {
      if (!finish || !entrants) return false;
      const cutoff = Math.floor(entrants * 0.10);
      return cutoff > 0 && finish <= cutoff;
    }
    function fmtPL(n) {
      if (n == null || isNaN(n)) return '—';
      const sign = n > 0 ? '+' : n < 0 ? '−' : '';
      return sign + '$' + Math.abs(Math.round(n)).toLocaleString();
    }

    /* Resolves an event's effective state, applying auto-skip if past + unrecorded */
    function resolveResult(event, rawResult) {
      if (rawResult) return rawResult;
      const eventEnd = new Date(event.date + 'T23:59:59Z').getTime();
      const now = Date.now();
      if (now - eventEnd > 24 * 3600 * 1000) {
        const estEntrants = Math.max(1, Math.round(event.gtd / event.buyIn));
        return {
          status: 'skipped',
          prizePool: event.gtd,
          entrants: estEntrants,
          finish: null,
          auto: true,
        };
      }
      return null;
    }

    function computePoints(results) {
      const byBracket = {};
      for (const b of BRACKETS) {
        const events = SCHEDULE.filter(e => e.bracket === b);
        const playedRanks = [];
        for (const e of events) {
          const r = results[e.id];
          if (r?.status === 'played' && r.entrants && r.finish) playedRanks.push(r.finish / r.entrants);
        }
        const avgRank = playedRanks.length ? playedRanks.reduce((a,c)=>a+c,0)/playedRanks.length : null;
        const eventPoints = events.map(e => {
          const r = resolveResult(e, results[e.id]);
          let points = 0, status = 'pending', rank = null;
          if (r?.status === 'played' && r.prizePool && r.entrants && r.finish) {
            rank = r.finish / r.entrants;
            points = Math.log10(r.prizePool) / Math.sqrt(rank);
            status = 'played';
          } else if (r?.status === 'skipped' && r.prizePool && r.entrants && avgRank) {
            points = Math.log10(r.prizePool) / Math.sqrt(avgRank);
            status = 'skipped';
            rank = avgRank;
          } else if (r?.status === 'skipped') {
            status = 'skipped';
          }
          // Money tracking
          let net = null, itm = false, top10 = false, missingWinnings = false;
          if (r?.status === 'played' && r.finish && r.entrants) {
            itm = inTheMoney(r.finish, r.entrants);
            top10 = isTop10Pct(r.finish, r.entrants);
            if (r.winnings != null && !isNaN(r.winnings)) {
              net = r.winnings - e.buyIn;
            } else {
              missingWinnings = true; // played but winnings not recorded
            }
          }
          return { event: e, points, status, rank, prizePool: r?.prizePool, entrants: r?.entrants, finish: r?.finish, auto: r?.auto, winnings: r?.winnings, itm, top10, net, missingWinnings };
        });
        const totalPoints = eventPoints.reduce((s, ep) => s + ep.points, 0);
        const playedEvents = eventPoints.filter(ep => ep.status === 'played');
        const bestFinish = playedEvents.length ? playedEvents.reduce((b, e) => (b == null || e.rank < b.rank ? e : b), null) : null;
        const biggestScore = eventPoints.length ? eventPoints.reduce((b, e) => e.points > (b?.points || 0) ? e : b, null) : null;
        // Bracket P/L: count buy-in lost for missing-winnings events (worst case)
        let bracketPL = 0, bracketPending = 0, bracketPendingTop10 = 0;
        let bracketVolume = 0, bracketTop5 = 0, bracketTop15 = 0, bracketPlayedN = 0;
        let bracketAvgROISum = 0;
        for (const ep of eventPoints) {
          if (ep.status !== 'played' || !ep.finish || !ep.entrants) continue;
          if (ep.net != null) bracketPL += ep.net;
          else {
            bracketPL -= ep.event.buyIn;
            bracketPending++;
            if (ep.top10) bracketPendingTop10++;
          }
          bracketVolume += ep.event.buyIn;
          bracketPlayedN++;
          const r = ep.finish / ep.entrants;
          if (r <= 0.15) bracketTop15++;
          if (r <= 0.05) bracketTop5++;
          const eventNet = ep.net != null ? ep.net : -ep.event.buyIn;
          if (ep.event.buyIn > 0) bracketAvgROISum += (eventNet / ep.event.buyIn) * 100;
        }
        const bracketROI = bracketVolume > 0 ? (bracketPL / bracketVolume) * 100 : 0;
        const bracketAvgROI = bracketPlayedN > 0 ? bracketAvgROISum / bracketPlayedN : 0;
        byBracket[b] = { totalPoints, eventPoints, avgRank, playedCount: playedRanks.length, bestFinish, biggestScore, bracketPL, bracketPending, bracketPendingTop10, bracketVolume, bracketTop5, bracketTop15, bracketPlayedN, bracketROI, bracketAvgROI };
      }
      return byBracket;
    }

    function parseMoneyInput(s) {
      if (typeof s !== 'string') return s;
      const trimmed = s.trim().toLowerCase().replace(/[$,\s]/g, '');
      if (!trimmed) return '';
      const m = trimmed.match(/^(\d+\.?\d*)([km])?$/);
      if (!m) return null;
      let n = parseFloat(m[1]);
      if (m[2] === 'k') n *= 1000;
      else if (m[2] === 'm') n *= 1000000;
      return Math.round(n);
    }
    function formatMoney(n) {
      if (n == null || isNaN(n)) return '';
      return '$' + Math.round(n).toLocaleString();
    }

    function EquityCurve({ points }) {
      if (points.length === 0) {
        return <div className="h-48 flex items-center justify-center text-zinc-600 text-sm">No played events yet — your equity curve will appear here once you record a finish.</div>;
      }
      const W = 800, H = 280;
      const PAD = { top: 24, right: 80, bottom: 32, left: 70 };
      const innerW = W - PAD.left - PAD.right;
      const innerH = H - PAD.top - PAD.bottom;
      const minY = Math.min(0, ...points.map(p => p.cumPL));
      const maxY = Math.max(0, ...points.map(p => p.cumPL));
      const range = (maxY - minY) || 1;
      const xScale = i => points.length === 1 ? PAD.left + innerW / 2 : PAD.left + (i / (points.length - 1)) * innerW;
      const yScale = v => PAD.top + (1 - (v - minY) / range) * innerH;
      const finalPL = points[points.length - 1].cumPL;
      const positive = finalPL >= 0;
      const lineColor = positive ? '#10b981' : '#ef4444';
      const fillColor = positive ? 'rgba(16, 185, 129, 0.18)' : 'rgba(239, 68, 68, 0.18)';
      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(i)},${yScale(p.cumPL)}`).join(' ');
      let areaPath = '';
      if (points.length > 1) {
        const baseline = yScale(0);
        areaPath = `M${xScale(0)},${baseline} ` + points.map((p, i) => `L${xScale(i)},${yScale(p.cumPL)}`).join(' ') + ` L${xScale(points.length-1)},${baseline} Z`;
      }
      const zeroY = yScale(0);
      const showZero = minY < 0 && maxY > 0;
      const firstDate = points[0].date;
      const lastDate = points[points.length - 1].date;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" className="w-full h-auto">
          <line x1={PAD.left} y1={yScale(maxY)} x2={W - PAD.right} y2={yScale(maxY)} stroke="#27272a" strokeWidth="1" />
          <line x1={PAD.left} y1={yScale(minY)} x2={W - PAD.right} y2={yScale(minY)} stroke="#27272a" strokeWidth="1" />
          {showZero && <line x1={PAD.left} y1={zeroY} x2={W - PAD.right} y2={zeroY} stroke="#52525b" strokeWidth="1" strokeDasharray="3 4" />}
          {areaPath && <path d={areaPath} fill={fillColor} />}
          <path d={linePath} fill="none" stroke={lineColor} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {points.map((p, i) => (
            <circle key={i} cx={xScale(i)} cy={yScale(p.cumPL)} r="3.5" fill={lineColor} stroke="#09090b" strokeWidth="2">
              <title>{`#${p.eventNum}-${p.bracket} ${p.eventName}\n${fmtDate(p.date)} ${p.time}\nThis event: ${fmtPL(p.net)}\nRunning total: ${fmtPL(p.cumPL)}`}</title>
            </circle>
          ))}
          <text x={PAD.left - 8} y={yScale(maxY) + 4} fill="#a1a1aa" fontSize="11" textAnchor="end" fontFamily="ui-monospace, monospace">{fmtPL(maxY)}</text>
          <text x={PAD.left - 8} y={yScale(minY) + 4} fill="#a1a1aa" fontSize="11" textAnchor="end" fontFamily="ui-monospace, monospace">{fmtPL(minY)}</text>
          {showZero && <text x={PAD.left - 8} y={zeroY + 4} fill="#71717a" fontSize="10" textAnchor="end" fontFamily="ui-monospace, monospace">$0</text>}
          <text x={PAD.left} y={H - 12} fill="#a1a1aa" fontSize="11" textAnchor="start">{fmtDate(firstDate)}</text>
          {firstDate !== lastDate && <text x={W - PAD.right} y={H - 12} fill="#a1a1aa" fontSize="11" textAnchor="end">{fmtDate(lastDate)}</text>}
          <circle cx={xScale(points.length - 1)} cy={yScale(finalPL)} r="6" fill={lineColor} fillOpacity="0.3"/>
          <text x={xScale(points.length - 1) + 10} y={yScale(finalPL) + 4} fill={lineColor} fontSize="13" fontWeight="bold" textAnchor="start" fontFamily="ui-monospace, monospace">{fmtPL(finalPL)}</text>
        </svg>
      );
    }

    function ImportModal({ currentResults, currentExternalRanks, onImport, onClose }) {
      const [text, setText] = useState('');
      const [parsed, setParsed] = useState(null);
      const [error, setError] = useState(null);
      const [copied, setCopied] = useState(false);

      const exportJSON = useMemo(() => JSON.stringify({
        version: 1,
        exportedAt: new Date().toISOString(),
        results: currentResults,
        externalRanks: currentExternalRanks,
      }, null, 2), [currentResults, currentExternalRanks]);

      const handleParse = (val) => {
        setText(val);
        if (!val.trim()) { setParsed(null); setError(null); return; }
        try {
          const obj = JSON.parse(val);
          const r = obj && typeof obj === 'object' && obj.results && typeof obj.results === 'object' ? obj.results : obj;
          if (!r || typeof r !== 'object' || Array.isArray(r)) throw new Error('Expected an object of results keyed by event id (e.g. "47-S")');
          const ext = obj && typeof obj === 'object' && obj.externalRanks && typeof obj.externalRanks === 'object' ? obj.externalRanks : null;
          // light validation
          const validKeys = new Set(SCHEDULE.map(e => e.id));
          let valid = 0, invalid = 0, invalidIds = [];
          for (const k of Object.keys(r)) {
            if (validKeys.has(k)) valid++;
            else { invalid++; if (invalidIds.length < 3) invalidIds.push(k); }
          }
          setParsed({ results: r, externalRanks: ext, valid, invalid, invalidIds });
          setError(null);
        } catch (e) {
          setParsed(null);
          setError(e.message);
        }
      };

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(exportJSON);
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        } catch (e) {
          // Fallback: select textarea text
          const ta = document.getElementById('export-textarea');
          if (ta) { ta.select(); document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 1800); }
        }
      };

      const handleApply = (mode) => {
        if (!parsed) return;
        onImport(parsed.results, parsed.externalRanks, mode);
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-zinc-900 border border-zinc-700 rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-4">
              <h3 className="text-lg font-bold text-white">Import / Export Data</h3>
              <button onClick={onClose} className="text-zinc-400 hover:text-white"><X size={20} /></button>
            </div>

            <div className="mb-6">
              <div className="flex items-center justify-between mb-2">
                <label className="text-xs text-zinc-400 uppercase tracking-wide font-bold">Export</label>
                <button onClick={handleCopy} className="text-xs bg-amber-500 hover:bg-amber-400 text-black font-semibold px-3 py-1 rounded">{copied ? 'Copied!' : 'Copy to clipboard'}</button>
              </div>
              <textarea
                id="export-textarea"
                readOnly
                value={exportJSON}
                className="w-full h-32 bg-zinc-950 border border-zinc-800 rounded p-2 text-xs font-mono text-zinc-300 focus:outline-none focus:border-amber-500"
              />
              <div className="text-xs text-zinc-500 mt-1">{Object.keys(currentResults).length} entries • paste this into a GitHub file or save anywhere as backup</div>
            </div>

            <div className="border-t border-zinc-800 pt-6">
              <label className="text-xs text-zinc-400 uppercase tracking-wide font-bold block mb-2">Import</label>
              <textarea
                value={text}
                onChange={e => handleParse(e.target.value)}
                placeholder='Paste JSON here. Either {"results": {...}} or just {"47-S": {...}, ...}'
                className="w-full h-40 bg-zinc-950 border border-zinc-700 rounded p-2 text-xs font-mono text-zinc-200 focus:outline-none focus:border-amber-500"
              />
              <div className="text-xs mt-2 min-h-[1.5rem]">
                {error && <span className="text-red-400">{error}</span>}
                {parsed && (
                  <div className="text-zinc-300">
                    <span className="text-emerald-400 font-semibold">{parsed.valid} valid entries</span>
                    {parsed.invalid > 0 && <span className="text-orange-400"> • {parsed.invalid} unknown event id{parsed.invalid === 1 ? '' : 's'} ({parsed.invalidIds.join(', ')}{parsed.invalid > 3 ? '…' : ''}) — will be ignored</span>}
                  </div>
                )}
              </div>
              <div className="flex gap-2 mt-3">
                <button
                  onClick={() => handleApply('merge')}
                  disabled={!parsed || parsed.valid === 0}
                  className={`flex-1 py-2 rounded font-semibold text-sm ${parsed && parsed.valid > 0 ? 'bg-amber-500 hover:bg-amber-400 text-black' : 'bg-zinc-700 text-zinc-500 cursor-not-allowed'}`}
                >
                  Merge with existing
                </button>
                <button
                  onClick={() => { if (confirm('Replace ALL existing entries with the imported data?')) handleApply('replace'); }}
                  disabled={!parsed || parsed.valid === 0}
                  className={`flex-1 py-2 rounded font-semibold text-sm ${parsed && parsed.valid > 0 ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-zinc-700 text-zinc-500 cursor-not-allowed'}`}
                >
                  Replace all
                </button>
              </div>
              <div className="text-xs text-zinc-500 mt-2 leading-relaxed">
                <span className="text-zinc-300 font-semibold">Merge</span> keeps your current data and overrides matching event ids. <span className="text-zinc-300 font-semibold">Replace</span> wipes everything first.
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [results, setResults] = useState({});
      const [activeBracket, setActiveBracket] = useState('overview');
      const [editEvent, setEditEvent] = useState(null);
      const [streamMode, setStreamMode] = useState(false);
      const [filter, setFilter] = useState('all');
      const [loaded, setLoaded] = useState(false);
      const [importOpen, setImportOpen] = useState(false);
      const [externalRanks, setExternalRanks] = useState({});
      const [lockPassword, setLockPassword] = useState(null);
      const [unlocked, setUnlocked] = useState(true);
      const [unlockInput, setUnlockInput] = useState('');
      const [unlockError, setUnlockError] = useState(false);

      const canEdit = !lockPassword || unlocked;

      useEffect(() => {
        try {
          const r = localStorage.getItem('ggpoker-tracker-results');
          if (r) setResults(JSON.parse(r));
          const er = localStorage.getItem('ggpoker-tracker-external-ranks');
          if (er) setExternalRanks(JSON.parse(er));
          const lp = localStorage.getItem('ggpoker-tracker-lock');
          if (lp) {
            setLockPassword(lp);
            setUnlocked(false);
          }
        } catch (e) {}
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        try { localStorage.setItem('ggpoker-tracker-results', JSON.stringify(results)); }
        catch (e) { console.error('save failed', e); }
      }, [results, loaded]);

      useEffect(() => {
        if (!loaded) return;
        try { localStorage.setItem('ggpoker-tracker-external-ranks', JSON.stringify(externalRanks)); }
        catch (e) { console.error('save failed', e); }
      }, [externalRanks, loaded]);

      useEffect(() => {
        if (!loaded) return;
        try {
          if (lockPassword) localStorage.setItem('ggpoker-tracker-lock', lockPassword);
          else localStorage.removeItem('ggpoker-tracker-lock');
        } catch (e) { console.error('save failed', e); }
      }, [lockPassword, loaded]);

      const tryUnlock = () => {
        if (unlockInput === lockPassword) {
          setUnlocked(true);
          setUnlockInput('');
          setUnlockError(false);
        } else {
          setUnlockError(true);
          setTimeout(() => setUnlockError(false), 2000);
        }
      };
      const handleSetPassword = () => {
        const pw = prompt(lockPassword ? 'Enter new password:' : 'Choose a password (e.g. 1234):\n\nNote: this is a light barrier, not real security. If you forget the password you\'ll have to clear browser data for this site (export your data first as a backup).', '');
        if (pw && pw.trim()) {
          setLockPassword(pw.trim());
        }
      };
      const handleRemoveLock = () => {
        if (confirm('Remove the edit lock? Anyone with access to this app will be able to modify data.')) {
          setLockPassword(null);
          setUnlocked(true);
          setUnlockInput('');
        }
      };
      const handleLockNow = () => {
        setUnlocked(false);
        setUnlockInput('');
      };

      const leaderboards = useMemo(() => computePoints(results), [results]);
      const totalPoints = BRACKETS.reduce((s, b) => s + leaderboards[b].totalPoints, 0);
      const allResolved = useMemo(() =>
        BRACKETS.flatMap(b => leaderboards[b].eventPoints), [leaderboards]);
      const playedCount = allResolved.filter(ep => ep.status === 'played').length;
      const skippedCount = allResolved.filter(ep => ep.status === 'skipped').length;
      const autoSkippedCount = allResolved.filter(ep => ep.status === 'skipped' && ep.auto).length;

      const totalPL = useMemo(() => {
        let pl = 0, pendingTop10 = 0, pending = 0, pcount = 0;
        for (const ep of allResolved) {
          if (ep.status !== 'played' || !ep.finish || !ep.entrants) continue;
          pcount++;
          if (ep.net != null) pl += ep.net;
          else {
            pl -= ep.event.buyIn;
            pending++;
            if (ep.top10) pendingTop10++;
          }
        }
        return { pl, pendingTop10, pending, pcount };
      }, [allResolved]);

      const metrics = useMemo(() => {
        let volume = 0, top5 = 0, top15 = 0, n = 0;
        let sumPerEventROI = 0;
        for (const ep of allResolved) {
          if (ep.status !== 'played' || !ep.finish || !ep.entrants) continue;
          n++;
          volume += ep.event.buyIn;
          const r = ep.finish / ep.entrants;
          if (r <= 0.15) top15++;
          if (r <= 0.05) top5++;
          // Per-event ROI for averaging (uses conservative -buyIn for missing winnings)
          const eventNet = ep.net != null ? ep.net : -ep.event.buyIn;
          if (ep.event.buyIn > 0) sumPerEventROI += (eventNet / ep.event.buyIn) * 100;
        }
        return {
          n,
          volume,
          avgBuyIn: n > 0 ? volume / n : 0,
          roi: volume > 0 ? (totalPL.pl / volume) * 100 : 0,
          avgROI: n > 0 ? sumPerEventROI / n : 0,
          top5, top15,
          top5Pct: n > 0 ? (top5 / n) * 100 : 0,
          top15Pct: n > 0 ? (top15 / n) * 100 : 0,
        };
      }, [allResolved, totalPL]);

      const equityCurve = useMemo(() => {
        const events = [];
        for (const ep of allResolved) {
          if (ep.status !== 'played' || !ep.finish || !ep.entrants) continue;
          events.push(ep);
        }
        events.sort((a, b) => {
          const c = a.event.date.localeCompare(b.event.date);
          if (c !== 0) return c;
          return a.event.time.localeCompare(b.event.time);
        });
        const points = [];
        let cum = 0;
        for (const ep of events) {
          const net = ep.net != null ? ep.net : -ep.event.buyIn;
          cum += net;
          points.push({
            date: ep.event.date,
            time: ep.event.time,
            eventNum: ep.event.num,
            eventName: ep.event.name,
            bracket: ep.event.bracket,
            net,
            cumPL: cum,
          });
        }
        return points;
      }, [allResolved]);

      const handleSaveResult = (eventId, data) => {
        setResults(prev => {
          const next = { ...prev };
          if (data === null) delete next[eventId];
          else next[eventId] = data;
          return next;
        });
      };

      const handleImport = (importedResults, importedRanks, mode) => {
        const validKeys = new Set(SCHEDULE.map(e => e.id));
        const filtered = {};
        for (const [k, v] of Object.entries(importedResults)) {
          if (validKeys.has(k) && v && typeof v === 'object') filtered[k] = v;
        }
        setResults(prev => mode === 'replace' ? filtered : { ...prev, ...filtered });
        if (importedRanks) {
          const filteredRanks = {};
          for (const b of BRACKETS) {
            if (typeof importedRanks[b] === 'string') filteredRanks[b] = importedRanks[b];
          }
          setExternalRanks(prev => mode === 'replace' ? filteredRanks : { ...prev, ...filteredRanks });
        } else if (mode === 'replace') {
          setExternalRanks({});
        }
      };

      if (streamMode) {
        return (
          <div className="relative">
            <StreamOverlay leaderboards={leaderboards} results={results} playedCount={playedCount} totalPoints={totalPoints} netPL={totalPL.pl} externalRanks={externalRanks} />
            <button onClick={() => setStreamMode(false)} className="fixed top-4 right-4 bg-zinc-800 hover:bg-zinc-700 text-white px-3 py-2 rounded text-xs flex items-center gap-2"><EyeOff size={14} /> Exit Stream</button>
          </div>
        );
      }

      const eventsToShow = activeBracket === 'overview' ? [] : leaderboards[activeBracket].eventPoints.filter(ep => {
        if (filter === 'played') return ep.status === 'played';
        if (filter === 'skipped') return ep.status === 'skipped';
        if (filter === 'past-pending') return ep.status === 'pending' && isPast(ep.event.date);
        if (filter === 'upcoming') return ep.status === 'pending' && !isPast(ep.event.date);
        if (filter === 'missing-winnings') return ep.missingWinnings;
        return true;
      });
      const eventsByDate = {};
      eventsToShow.forEach(ep => { if (!eventsByDate[ep.event.date]) eventsByDate[ep.event.date] = []; eventsByDate[ep.event.date].push(ep); });

      return (
        <div className="min-h-screen text-white" style={{
          backgroundColor: '#09090b',
          backgroundImage: 'radial-gradient(circle at 20% 0%, rgba(251,191,36,0.05) 0%, transparent 50%), radial-gradient(circle at 80% 100%, rgba(220,38,38,0.05) 0%, transparent 50%)'
        }}>
          <div className="max-w-6xl mx-auto p-4 md:p-6">
            <header className="mb-6">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="flex">
                    <div className="w-2 h-10 bg-black border border-zinc-700"></div>
                    <div className="w-2 h-10 bg-yellow-400"></div>
                    <div className="w-2 h-10 bg-red-600"></div>
                  </div>
                  <div>
                    <h1 className="text-2xl md:text-3xl font-black tracking-tight">Belgian Shadow Leaderboard</h1>
                    <p className="text-zinc-400 text-xs uppercase tracking-widest">GGpoker World Festival 2026 • Unofficial</p>
                  </div>
                </div>
                <button onClick={() => setStreamMode(true)} className="bg-gradient-to-r from-amber-500 to-red-600 hover:from-amber-400 hover:to-red-500 text-black font-bold px-4 py-2 rounded-lg flex items-center gap-2 text-sm"><Eye size={16} /> Stream Mode</button>
              </div>
            </header>

            {lockPassword && !unlocked && (
              <div className={`mb-4 rounded-xl border p-4 ${unlockError ? 'border-red-500/60 bg-red-950/30' : 'border-amber-700/50 bg-amber-950/30'}`}>
                <div className="flex flex-col md:flex-row md:items-center gap-3">
                  <div className="flex items-center gap-3 flex-1 min-w-0">
                    <div className={unlockError ? 'text-red-400' : 'text-amber-400'}><Lock size={20}/></div>
                    <div className="min-w-0">
                      <div className={`font-bold text-sm ${unlockError ? 'text-red-300' : 'text-amber-200'}`}>{unlockError ? 'Wrong password' : 'Read-only mode'}</div>
                      <div className="text-zinc-400 text-xs">Enter password to edit data this session</div>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <input
                      type="password"
                      value={unlockInput}
                      onChange={e => setUnlockInput(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') tryUnlock(); }}
                      placeholder="password"
                      autoFocus
                      className="bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-amber-500 flex-1 min-w-0"
                    />
                    <button onClick={tryUnlock} className="bg-amber-500 hover:bg-amber-400 text-black font-semibold px-4 py-2 rounded text-sm whitespace-nowrap">Unlock</button>
                  </div>
                </div>
              </div>
            )}

            <div className="bg-gradient-to-br from-zinc-900 to-black border border-zinc-800 rounded-xl p-5 mb-3 flex items-center justify-between gap-4 flex-wrap">
              <div className="min-w-0">
                <div className="text-xs text-zinc-400 uppercase tracking-widest font-bold flex items-center gap-2"><DollarSign size={12} /> Net Profit / Loss</div>
                <div className={`text-4xl md:text-5xl font-black tabular-nums mt-1 ${totalPL.pl > 0 ? 'text-emerald-400' : totalPL.pl < 0 ? 'text-red-400' : 'text-zinc-300'}`}>{fmtPL(totalPL.pl)}</div>
                {metrics.n > 0 && (
                  <div className="text-base font-bold mt-1 flex flex-wrap gap-x-4 gap-y-1">
                    <span title="Net P/L ÷ total buy-ins (volume-weighted)">
                      <span className="text-zinc-500 font-semibold">Total ROI</span>{' '}
                      <span className={metrics.roi > 0 ? 'text-emerald-400' : metrics.roi < 0 ? 'text-red-400' : 'text-zinc-400'}>{metrics.roi > 0 ? '+' : ''}{metrics.roi.toFixed(1)}%</span>
                    </span>
                    <span title="Mean of per-event ROI (each event weighted equally)">
                      <span className="text-zinc-500 font-semibold">Avg ROI</span>{' '}
                      <span className={metrics.avgROI > 0 ? 'text-emerald-400' : metrics.avgROI < 0 ? 'text-red-400' : 'text-zinc-400'}>{metrics.avgROI > 0 ? '+' : ''}{metrics.avgROI.toFixed(1)}%</span>
                    </span>
                  </div>
                )}
                <div className="text-xs text-zinc-500 mt-1">across {totalPL.pcount} played event{totalPL.pcount === 1 ? '' : 's'}{metrics.n > 0 && <span> • avg buy-in {fmt$(metrics.avgBuyIn)}</span>}{totalPL.pending > 0 && <span> • {totalPL.pending} missing winnings</span>}</div>
              </div>
              {totalPL.pendingTop10 > 0 && (
                <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg px-4 py-3 text-sm">
                  <div className="text-amber-400 font-bold flex items-center gap-2"><AlertTriangle size={14} /> {totalPL.pendingTop10} top-10% finish{totalPL.pendingTop10 === 1 ? '' : 'es'} missing winnings</div>
                  <div className="text-zinc-400 text-xs mt-1">P/L assumes buy-in lost — fill in to update</div>
                </div>
              )}
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
              <StatCard icon={Coins} label="Volume" value={fmt$(metrics.volume)} subvalue={metrics.n > 0 ? `${metrics.n} played event${metrics.n === 1 ? '' : 's'}` : 'no plays yet'} color="#fbbf24" />
              <StatCard icon={TrendingUp} label="Top 5%" value={metrics.n > 0 ? `${metrics.top5Pct.toFixed(1)}%` : '—'} subvalue={metrics.n > 0 ? `${metrics.top5} of ${metrics.n} played` : 'no plays yet'} color="#10b981" />
              <StatCard icon={Percent} label="Top 15%" value={metrics.n > 0 ? `${metrics.top15Pct.toFixed(1)}%` : '—'} subvalue={metrics.n > 0 ? `${metrics.top15} of ${metrics.n} played` : 'no plays yet'} color="#3b82f6" />
              <StatCard icon={Target} label="Events Played" value={playedCount} subvalue={`${skippedCount} skipped${autoSkippedCount ? ` (${autoSkippedCount} auto)` : ''} • ${SCHEDULE.length - playedCount - skippedCount} upcoming`} color="#a78bfa" />
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
              <StatCard icon={Trophy} label="Total Points" value={totalPoints.toFixed(2)} subvalue="across all 4 brackets" color="#fbbf24" />
              <StatCard icon={DollarSign} label="Avg Buy-in" value={metrics.n > 0 ? fmt$(metrics.avgBuyIn) : '—'} subvalue={metrics.n > 0 ? `over ${metrics.n} played event${metrics.n === 1 ? '' : 's'}` : 'no plays yet'} color="#10b981" />
            </div>

            <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
              <button onClick={() => setActiveBracket('overview')} className={`px-4 py-2 rounded-lg font-semibold text-sm flex-shrink-0 transition-all ${activeBracket === 'overview' ? 'bg-white text-black' : 'bg-zinc-900 text-zinc-300 hover:bg-zinc-800'}`}><BarChart3 size={14} /> Overview</button>
              {BRACKETS.map(b => (
                <button key={b} onClick={() => { setActiveBracket(b); setFilter('all'); }} className={`px-4 py-2 rounded-lg font-semibold text-sm flex-shrink-0 transition-all ${activeBracket === b ? 'text-black' : 'bg-zinc-900 text-zinc-300 hover:bg-zinc-800'}`} style={activeBracket === b ? { backgroundColor: BRACKET_COLOR[b] } : {}}>
                  {BRACKET_LABEL[b]} ({b}) · {leaderboards[b].totalPoints.toFixed(1)}
                </button>
              ))}
            </div>

            {activeBracket === 'overview' && (
              <div className="space-y-6">
                <div className="bg-zinc-900/40 border border-zinc-800 rounded-xl p-5">
                  <div className="flex items-baseline justify-between gap-4 mb-3 flex-wrap">
                    <h3 className="text-amber-400 font-bold text-sm uppercase tracking-wider flex items-center gap-2"><TrendingUp size={16} /> Equity Curve</h3>
                    {equityCurve.length > 0 && (
                      <div className="text-xs text-zinc-500">{equityCurve.length} played event{equityCurve.length === 1 ? '' : 's'} • cumulative P/L over time</div>
                    )}
                  </div>
                  <EquityCurve points={equityCurve} />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {BRACKETS.map(b => {
                    const lb = leaderboards[b];
                    const total = SCHEDULE.filter(e => e.bracket === b).length;
                    return (
                      <button key={b} onClick={() => setActiveBracket(b)} className="bg-gradient-to-br from-zinc-900 to-zinc-950 border-2 rounded-xl p-5 text-left hover:scale-[1.01] transition-transform" style={{ borderColor: BRACKET_COLOR[b] + '66' }}>
                        <div className="flex justify-between items-start mb-3">
                          <div>
                            <div className="text-xs uppercase tracking-widest font-bold" style={{ color: BRACKET_COLOR[b] }}>{BRACKET_LABEL[b]} Bracket</div>
                            <div className="text-4xl font-black tabular-nums mt-1" style={{ color: BRACKET_COLOR[b] }}>{lb.totalPoints.toFixed(2)}</div>
                          </div>
                          <div className="text-right text-xs text-zinc-500"><div>{lb.playedCount} played</div><div>{total} events</div></div>
                        </div>
                        <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                          <div className="h-full" style={{ width: `${(lb.playedCount/total)*100}%`, backgroundColor: BRACKET_COLOR[b] }}></div>
                        </div>
                        {lb.avgRank != null && <div className="text-xs text-zinc-400 mt-3">Avg finish: <span className="font-mono text-white">top {(lb.avgRank * 100).toFixed(1)}%</span></div>}
                      </button>
                    );
                  })}
                </div>
                <div className="bg-zinc-900/40 border border-zinc-800 rounded-xl p-5">
                  <h3 className="text-amber-400 font-bold text-sm uppercase tracking-wider mb-3 flex items-center gap-2"><Zap size={16} /> How Points Are Calculated</h3>
                  <div className="text-sm text-zinc-300 space-y-2 leading-relaxed">
                    <p><span className="text-amber-400 font-mono">Points = log₁₀(Prize Pool) ÷ √(Relative Rank)</span></p>
                    <p>Where <span className="text-zinc-100">Relative Rank = Finish ÷ Total Entrants</span> (lower is better — 1st in 1000 = 0.001).</p>
                    <p>For events you skip, your <span className="text-amber-400 font-semibold">average relative rank in that bracket</span> is used so you're not penalized for sitting out.</p>
                    <p className="text-zinc-500 text-xs pt-2 border-t border-zinc-800">Tip: open any event and mark it Played, Skipped, or leave it pending. Stream Mode gives you a clean overlay you can capture with OBS as a browser source.</p>
                  </div>
                </div>
                <div className="bg-zinc-900/40 border border-zinc-800 rounded-xl p-5">
                  <h3 className="text-amber-400 font-bold text-sm uppercase tracking-wider mb-1 flex items-center gap-2"><Award size={16} /> External Rankings</h3>
                  <div className="text-xs text-zinc-500 mb-4 leading-relaxed">Your rank vs other players from the official leaderboard. Free text — paste whatever format your source gives you ("Top 5%", "#12", "12 / 1200"). Shown on the stream overlay.</div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {BRACKETS.map(b => (
                      <div key={b}>
                        <label className="text-xs uppercase tracking-wide font-bold mb-1 block" style={{color: BRACKET_COLOR[b]}}>{BRACKET_LABEL[b]} ({b})</label>
                        <input
                          type="text"
                          value={externalRanks[b] || ''}
                          onChange={e => setExternalRanks(prev => ({...prev, [b]: e.target.value}))}
                          placeholder="—"
                          disabled={!canEdit}
                          className={`w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-amber-500 ${!canEdit ? 'opacity-60 cursor-not-allowed' : ''}`}
                        />
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-zinc-900/40 border border-zinc-800 rounded-xl p-5">
                  <h3 className="text-zinc-400 font-bold text-sm uppercase tracking-wider mb-3">Data</h3>
                  <div className="flex flex-wrap gap-2">
                    <button onClick={() => canEdit && setImportOpen(true)} disabled={!canEdit} className={`bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-semibold px-4 py-2 rounded ${!canEdit ? 'opacity-50 cursor-not-allowed hover:bg-zinc-800' : ''}`}>Import / Export…</button>
                    {(playedCount + skippedCount) > 0 && (
                      <button onClick={() => { if (canEdit && confirm('Clear all entries? This cannot be undone.')) { setResults({}); setExternalRanks({}); } }} disabled={!canEdit} className={`bg-zinc-800 hover:bg-red-900/40 hover:text-red-300 text-zinc-400 text-sm font-semibold px-4 py-2 rounded ${!canEdit ? 'opacity-50 cursor-not-allowed hover:bg-zinc-800 hover:text-zinc-400' : ''}`}>Reset all entries</button>
                    )}
                  </div>
                  <div className="text-xs text-zinc-500 mt-3 leading-relaxed">Export gives you a JSON snapshot you can save in a GitHub file. Paste that JSON back into Import on any device to restore or sync.</div>

                  {canEdit && (
                    <div className="mt-4 pt-4 border-t border-zinc-800">
                      <div className="flex flex-wrap items-center gap-2">
                        <span className="text-xs text-zinc-400 flex items-center gap-1.5"><Lock size={12} /> {lockPassword ? <span><span className="text-amber-400">Edit lock enabled</span> — app starts read-only each session</span> : 'No edit lock'}</span>
                      </div>
                      <div className="flex flex-wrap gap-2 mt-2">
                        {lockPassword ? (
                          <>
                            <button onClick={handleSetPassword} className="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-semibold px-3 py-1.5 rounded">Change password</button>
                            <button onClick={handleLockNow} className="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-semibold px-3 py-1.5 rounded">Lock now</button>
                            <button onClick={handleRemoveLock} className="bg-zinc-800 hover:bg-red-900/40 hover:text-red-300 text-zinc-400 text-xs font-semibold px-3 py-1.5 rounded">Remove lock</button>
                          </>
                        ) : (
                          <button onClick={handleSetPassword} className="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-semibold px-3 py-1.5 rounded">Set lock password</button>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {activeBracket !== 'overview' && (
              <div>
                <div className="bg-zinc-900/40 border border-zinc-800 rounded-xl p-5 mb-4">
                  <div className="flex flex-wrap gap-6 items-baseline">
                    <div>
                      <div className="text-xs uppercase tracking-widest text-zinc-400">Total Points</div>
                      <div className="text-4xl font-black tabular-nums" style={{ color: BRACKET_COLOR[activeBracket] }}>{leaderboards[activeBracket].totalPoints.toFixed(2)}</div>
                    </div>
                    <div>
                      <div className="text-xs uppercase tracking-widest text-zinc-400">Played</div>
                      <div className="text-2xl font-bold text-white">{leaderboards[activeBracket].playedCount}</div>
                    </div>
                    <div>
                      <div className="text-xs uppercase tracking-widest text-zinc-400">Avg Rank</div>
                      <div className="text-2xl font-bold text-white">{leaderboards[activeBracket].avgRank != null ? `top ${(leaderboards[activeBracket].avgRank * 100).toFixed(1)}%` : '—'}</div>
                    </div>
                    {leaderboards[activeBracket].biggestScore?.points > 0 && (
                      <div>
                        <div className="text-xs uppercase tracking-widest text-zinc-400">Biggest score</div>
                        <div className="text-2xl font-bold text-amber-400 font-mono">+{leaderboards[activeBracket].biggestScore.points.toFixed(2)}</div>
                      </div>
                    )}
                    <div>
                      <div className="text-xs uppercase tracking-widest text-zinc-400 flex items-center gap-1">
                        Net P/L
                        {leaderboards[activeBracket].bracketPendingTop10 > 0 && (
                          <span className="text-amber-400" title={`${leaderboards[activeBracket].bracketPendingTop10} top-10% finish(es) missing winnings`}><AlertTriangle size={11} /></span>
                        )}
                      </div>
                      <div className={`text-2xl font-bold font-mono ${leaderboards[activeBracket].bracketPL > 0 ? 'text-emerald-400' : leaderboards[activeBracket].bracketPL < 0 ? 'text-red-400' : 'text-zinc-300'}`}>{fmtPL(leaderboards[activeBracket].bracketPL)}</div>
                    </div>
                    {leaderboards[activeBracket].bracketVolume > 0 && (
                      <>
                        <div>
                          <div className="text-xs uppercase tracking-widest text-zinc-400">Total ROI</div>
                          <div className={`text-2xl font-bold font-mono ${leaderboards[activeBracket].bracketROI > 0 ? 'text-emerald-400' : leaderboards[activeBracket].bracketROI < 0 ? 'text-red-400' : 'text-zinc-300'}`}>{leaderboards[activeBracket].bracketROI > 0 ? '+' : ''}{leaderboards[activeBracket].bracketROI.toFixed(1)}%</div>
                        </div>
                        <div>
                          <div className="text-xs uppercase tracking-widest text-zinc-400">Avg ROI</div>
                          <div className={`text-2xl font-bold font-mono ${leaderboards[activeBracket].bracketAvgROI > 0 ? 'text-emerald-400' : leaderboards[activeBracket].bracketAvgROI < 0 ? 'text-red-400' : 'text-zinc-300'}`}>{leaderboards[activeBracket].bracketAvgROI > 0 ? '+' : ''}{leaderboards[activeBracket].bracketAvgROI.toFixed(1)}%</div>
                        </div>
                        <div>
                          <div className="text-xs uppercase tracking-widest text-zinc-400">Volume</div>
                          <div className="text-2xl font-bold text-white font-mono">{fmt$(leaderboards[activeBracket].bracketVolume)}</div>
                        </div>
                        <div>
                          <div className="text-xs uppercase tracking-widest text-zinc-400">Top 5%</div>
                          <div className="text-2xl font-bold text-white">{((leaderboards[activeBracket].bracketTop5 / leaderboards[activeBracket].bracketPlayedN) * 100).toFixed(0)}% <span className="text-sm text-zinc-500">({leaderboards[activeBracket].bracketTop5}/{leaderboards[activeBracket].bracketPlayedN})</span></div>
                        </div>
                        <div>
                          <div className="text-xs uppercase tracking-widest text-zinc-400">Top 15%</div>
                          <div className="text-2xl font-bold text-white">{((leaderboards[activeBracket].bracketTop15 / leaderboards[activeBracket].bracketPlayedN) * 100).toFixed(0)}% <span className="text-sm text-zinc-500">({leaderboards[activeBracket].bracketTop15}/{leaderboards[activeBracket].bracketPlayedN})</span></div>
                        </div>
                      </>
                    )}
                  </div>
                </div>
                <div className="flex gap-2 mb-3 overflow-x-auto">
                  {[{v:'all',l:'All'},{v:'played',l:'Played'},{v:'skipped',l:'Skipped'},{v:'past-pending',l:'Need to Record'},{v:'missing-winnings',l:'Missing Winnings'},{v:'upcoming',l:'Upcoming'}].map(f => (
                    <button key={f.v} onClick={() => setFilter(f.v)} className={`px-3 py-1.5 rounded text-xs font-semibold flex-shrink-0 ${filter === f.v ? 'bg-zinc-700 text-white' : 'bg-zinc-900 text-zinc-400 hover:text-white'}`}>{f.l}</button>
                  ))}
                </div>
                <div className="space-y-4">
                  {Object.keys(eventsByDate).length === 0 && <div className="text-center text-zinc-500 py-12">No events match this filter.</div>}
                  {Object.keys(eventsByDate).sort().map(date => (
                    <div key={date}>
                      <div className="flex items-center gap-2 text-xs text-zinc-400 uppercase tracking-wider font-bold mb-2 px-1"><Calendar size={12} />{fmtDate(date)}</div>
                      <div className="space-y-1.5">
                        {eventsByDate[date].sort((a,b) => a.event.time.localeCompare(b.event.time)).map(ep => (
                          <EventRow key={ep.event.id} ep={ep} onClick={() => canEdit && setEditEvent(ep.event)} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          {editEvent && <EventModal event={editEvent} result={results[editEvent.id]} onSave={(data) => handleSaveResult(editEvent.id, data)} onClose={() => setEditEvent(null)} />}
          {importOpen && <ImportModal currentResults={results} currentExternalRanks={externalRanks} onImport={handleImport} onClose={() => setImportOpen(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
